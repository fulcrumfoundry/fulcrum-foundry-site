#hero-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

@keyframes drift { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(35px,-25px) scale(1.06); } 100% { transform: translate(-25px,18px) scale(0.94); } }

.nav-cta:hover { background: var(--accent-1); color: #fff; box-shadow: 0 0 24px rgba(78,234,219,0.15); }

.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 24px; position: relative; }
.hero-glow { position: absolute; width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%,-55%); background: radial-gradient(circle, rgba(45,140,170,0.14) 0%, transparent 70%); pointer-events: none; }

.hero h1 { font-family: var(--font-heading); font-size: clamp(2.2rem, 5.5vw, 4rem); font-weight: 700; line-height: 1.12; letter-spacing: -0.03em; opacity: 0; transform: translateY(24px); animation: fadeIn 0.9s ease forwards; }
.hero h1 .gradient-text { background: linear-gradient(90deg, var(--accent-2), var(--accent-1), var(--accent-3), var(--accent-2)); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradShift 6s ease-in-out infinite; }
@keyframes gradShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

.tagline { font-size: clamp(0.95rem, 2vw, 1.25rem); color: var(--text-muted); margin-top: 20px; font-weight: 400; opacity: 0; transform: translateY(16px); animation: fadeIn 0.8s ease 0.5s forwards; max-width: 600px; }
.tagline .typed { color: var(--accent-2); font-weight: 500; }
.tagline .cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--accent-2); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.7s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

.cta-wrap { margin-top: 44px; opacity: 0; transform: translateY(16px); animation: fadeIn 0.8s ease 1s forwards; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.cta-btn { font-family: var(--font-heading); font-size: 1rem; font-weight: 600; padding: 15px 36px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent-1), var(--accent-3)); color: #fff; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 0 24px rgba(78,234,219,0.15), 0 0 60px rgba(45,140,170,0.08); animation: pulseGlow 3s ease-in-out infinite; letter-spacing: 0.01em; text-decoration: none; display: inline-block; }
.cta-btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 0 36px rgba(78,234,219,0.28), 0 0 80px rgba(45,140,170,0.16); }
.cta-btn:active { transform: scale(0.98); }
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 24px rgba(78,234,219,0.15), 0 0 60px rgba(45,140,170,0.08); } 50% { box-shadow: 0 0 32px rgba(78,234,219,0.25), 0 0 80px rgba(45,140,170,0.14); } }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

footer { flex-shrink: 0; text-align: center; padding: 16px; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.03em; }

      <a class="cta-btn" id="cta-btn" href="mailto:info@fulcrumfoundry.com?subject=Hello%20from%20Fulcrum%20Foundry&amp;body=Hi%20Fulcrum%20Foundry%20team%2C%0A%0AI%27d%20like%20to%20learn%20more%20about%20how%20you%20can%20help%20my%20business.%0A%0ACompany%3A%20%0AWebsite%3A%20%0AWhat%20we%27re%20looking%20for%3A%20%0A%0AThanks%21">Get In Touch</a>
    </div>
  </section>
  <footer>&copy; 2026 Fulcrum Foundry</footer>

<script>
(function() {
  const canvas = document.getElementById('hero-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, nodes = [];
  const CONNECT_DIST = 150;
  const MOUSE_RADIUS = 220;
  let mouse = { x: -9999, y: -9999 };
  let time = 0;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    if (nodes.length === 0) initNodes();
  }

  function initNodes() {
    nodes = [];
    const count = Math.max(40, Math.min(120, Math.round(80 * (w * h) / (1920 * 1080))));
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
        r: 1.2 + Math.random() * 1.5,
        pulseOff: Math.random() * Math.PI * 2,
        pulseSpd: 0.4 + Math.random() * 0.5
      });
    }
  }

  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
  window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

  function draw() {
    ctx.clearRect(0, 0, w, h);
    time += 0.005;

    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0) { n.x = 0; n.vx *= -1; }
      if (n.x > w) { n.x = w; n.vx *= -1; }
      if (n.y < 0) { n.y = 0; n.vy *= -1; }
      if (n.y > h) { n.y = h; n.vy *= -1; }

      const mdx = mouse.x - n.x, mdy = mouse.y - n.y;
      const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (mDist < MOUSE_RADIUS && mDist > 1) {
        n.vx += (mdx / mDist) * 0.012;
        n.vy += (mdy / mDist) * 0.012;
      }
      n.vx *= 0.998; n.vy *= 0.998;
    }

    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECT_DIST) {
          const alpha = (1 - dist / CONNECT_DIST) * 0.10;
          const midX = (a.x + b.x) / 2, midY = (a.y + b.y) / 2;
          const mDistMid = Math.sqrt((mouse.x - midX) ** 2 + (mouse.y - midY) ** 2);
          const mouseBoost = mDistMid < MOUSE_RADIUS ? (1 - mDistMid / MOUSE_RADIUS) * 0.18 : 0;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(78, 234, 219, ${alpha + mouseBoost})`;
          ctx.lineWidth = 0.5 + mouseBoost * 2;
          ctx.stroke();
        }
      }
    }

    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const pulse = Math.sin(time * n.pulseSpd + n.pulseOff) * 0.5 + 0.5;
      const mdx = mouse.x - n.x, mdy = mouse.y - n.y;
      const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
      const prox = mDist < MOUSE_RADIUS ? (1 - mDist / MOUSE_RADIUS) : 0;
      const alpha = 0.12 + pulse * 0.12 + prox * 0.5;
      const r = n.r + prox * 2.5;

      if (prox > 0.2) {
        const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 5);
        grd.addColorStop(0, `rgba(78, 234, 219, ${prox * 0.12})`);
        grd.addColorStop(1, 'rgba(78, 234, 219, 0)');
        ctx.beginPath(); ctx.arc(n.x, n.y, r * 5, 0, Math.PI * 2);
        ctx.fillStyle = grd; ctx.fill();
      }

      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(78, 234, 219, ${alpha})`;
      ctx.fill();
    }

    if (Math.random() < 0.04 && nodes.length > 1) {
      const idx = Math.floor(Math.random() * nodes.length);
      const a = nodes[idx];
      let closest = null, cd = Infinity;
      for (let j = 0; j < nodes.length; j++) {
        if (j === idx) continue;
        const dx = a.x - nodes[j].x, dy = a.y - nodes[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < CONNECT_DIST && d < cd) { cd = d; closest = nodes[j]; }
      }
      if (closest) {
        const grad = ctx.createLinearGradient(a.x, a.y, closest.x, closest.y);
        grad.addColorStop(0, 'rgba(78, 234, 219, 0.55)');
        grad.addColorStop(0.5, 'rgba(45, 140, 170, 0.25)');
        grad.addColorStop(1, 'rgba(78, 234, 219, 0)');
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(closest.x, closest.y);
        ctx.strokeStyle = grad; ctx.lineWidth = 1.8; ctx.stroke();
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); draw();
})();

(function() {
  const phrases = ["run your operations 24/7.", "handle your inbox in minutes.", "saves you 10+ hours a week.", "scale your business without scaling headcount.", "free you to focus on growth."];
  const el = document.getElementById('typed-text');
  let pIdx=0, cIdx=0, del=false;
  function tick() {
    const p = phrases[pIdx];
    if (!del) { el.textContent=p.slice(0,++cIdx); if(cIdx===p.length){setTimeout(()=>{del=true;tick();},2200);return;} setTimeout(tick,50); }
    else { el.textContent=p.slice(0,--cIdx); if(cIdx===0){del=false;pIdx=(pIdx+1)%phrases.length;setTimeout(tick,400);return;} setTimeout(tick,28); }
  }
  setTimeout(tick, 1400);
})();

(function() {
  document.getElementById('cta-btn').addEventListener('click', () => { gtag('event', 'cta_click', { event_category: 'engagement', event_label: 'hero_button' }); });
  document.getElementById('nav-cta-btn').addEventListener('click', () => { gtag('event', 'cta_click', { event_category: 'engagement', event_label: 'nav_button' }); });
})();
</script>
